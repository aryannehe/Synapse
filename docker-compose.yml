version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synapse-workspace-app
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/synapse-workspace
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NODE_ENV=production
      - NEXT_PUBLIC_DEMO_MODE=true
    depends_on:
      - mongodb
    restart: always

  mongodb:
    image: mongo:6.0
    container_name: synapse-workspace-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data:
